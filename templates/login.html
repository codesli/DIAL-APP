<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DIAL - Portal Authentication</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <header class="navbar">
    <nav class="container">
      <div class="nav-content">
        <a href="/" class="logo">
          <div class="logo-icon"><i data-lucide="activity"></i></div>
          <div class="logo-text">
            <span class="logo-title">DIAL</span>
            <span class="logo-subtitle">AI Platform</span>
          </div>
        </a>
        <div class="nav-links" id="navLinks">
          <a href="/" class="nav-link">Home</a>
          <a href="/info" class="nav-link">About Leukemia</a>
        </div>
      </div>
    </nav>
  </header>

  <div class="auth-shell">
    <div class="auth-card">
      <div style="text-align: center; margin-bottom: 30px;">
        <div class="auth-icon">
          <i data-lucide="shield-check" style="width: 28px; height: 28px;"></i>
        </div>
        <h2 style="margin: 0; color: #1e293b; font-size: 24px; font-weight: 700;">Clinical Access Only</h2>
        <p style="margin: 5px 0 0; color: #64748b; font-size: 14px;">DIAL Secure Practitioner Verification</p>
      </div>

      <div id="error-message" class="auth-error"></div>

      <form id="login-form">
        <div class="auth-field">
          <label for="username">Medical Email Address</label>
          <input type="email" id="username" required placeholder="doctor@dial.org" autocomplete="username">
        </div>

        <div class="auth-field">
          <label for="password">Security Password</label>
          <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
        </div>

        <button type="submit" class="btn-primary auth-submit">
          Authenticate Session
        </button>
      </form>

      <div class="auth-footnote">
        Authorized Medical Networks Only
      </div>
    </div>
  </div>

  <script>
    lucide.createIcons();

    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('error-message');
      const submitBtn = e.target.querySelector('button[type="submit"]');

      errorDiv.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.innerText = 'Verifying…';

      try {
        const response = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await response.json();

        if (data.success) {
          window.location.href = '/ai-tool';
        } else {
          errorDiv.style.display = 'block';
          errorDiv.innerText = data.message || 'Invalid medical credentials.';
        }
      } catch (error) {
        errorDiv.style.display = 'block';
        errorDiv.innerText = "System validation error. Please check backend connection.";
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerText = 'Authenticate Session';
      }
    });
  </script>
</body>
</html>
